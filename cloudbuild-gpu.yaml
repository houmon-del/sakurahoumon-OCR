steps:
  # Build Docker image with :gpu tag
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sakurahoumon-ocr/sakurahoumon-ocr:gpu'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sakurahoumon-ocr/sakurahoumon-ocr:$COMMIT_SHA'
      - '.'
    timeout: '1800s'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sakurahoumon-ocr/sakurahoumon-ocr'

  # Restart container on GPU VM
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud compute ssh sakurahoumon-ocr-gpu \
          --zone=us-east1-d \
          --project=$PROJECT_ID \
          --strict-host-key-checking=no \
          --command="
            TOKEN=\$(curl -s 'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' -H 'Metadata-Flavor: Google' | python3 -c 'import sys,json; print(json.load(sys.stdin)[\"access_token\"])') &&
            mkdir -p /tmp/.docker &&
            echo \"\$TOKEN\" | docker --config /tmp/.docker login -u oauth2accesstoken --password-stdin https://asia-northeast1-docker.pkg.dev &&
            docker --config /tmp/.docker pull asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sakurahoumon-ocr/sakurahoumon-ocr:gpu &&
            docker rm -f ocr &&
            ANTHROPIC_API_KEY=\$(curl -s 'https://secretmanager.googleapis.com/v1/projects/$PROJECT_ID/secrets/anthropic-api-key/versions/latest:access' -H \"Authorization: Bearer \$TOKEN\" | python3 -c 'import sys,json,base64; print(base64.b64decode(json.load(sys.stdin)[\"payload\"][\"data\"]).decode())') &&
            docker --config /tmp/.docker run -d --name ocr --restart=always \
              --volume /var/lib/nvidia/lib64:/usr/local/nvidia/lib64 \
              --volume /var/lib/nvidia/bin:/usr/local/nvidia/bin \
              --device /dev/nvidia0:/dev/nvidia0 \
              --device /dev/nvidia-uvm:/dev/nvidia-uvm \
              --device /dev/nvidiactl:/dev/nvidiactl \
              -e LD_LIBRARY_PATH=/usr/local/nvidia/lib64 \
              -e ANTHROPIC_API_KEY=\"\$ANTHROPIC_API_KEY\" \
              -p 8080:8080 \
              asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sakurahoumon-ocr/sakurahoumon-ocr:gpu
          "

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
