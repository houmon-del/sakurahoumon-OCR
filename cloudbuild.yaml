steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '.'
    timeout: '1800s'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '32Gi'
      - '--cpu'
      - '8'
      - '--gpu'
      - '1'
      - '--gpu-type'
      - 'nvidia-l4'
      - '--concurrency'
      - '1'
      - '--timeout'
      - '300s'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      - '--session-affinity'
      - '--execution-environment'
      - 'gen2'
      - '--cpu-boost'
      - '--no-cpu-throttling'
      - '--no-allow-unauthenticated'
      - '--service-account'
      - '${_SERVICE_ACCOUNT}'
      - '--set-secrets'
      - 'ANTHROPIC_API_KEY=anthropic-api-key:latest'

substitutions:
  _REGION: asia-northeast1
  _SERVICE_NAME: sakurahoumon-ocr
  _REPOSITORY: sakurahoumon-ocr
  _SERVICE_ACCOUNT: sakurahoumon-ocr-sa@elite-campus-480105-h9.iam.gserviceaccount.com

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '3600s'
